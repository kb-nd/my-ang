<div class="task-list-container">
  <div class="header">
    <h2>Feladatok</h2>
    <a mat-flat-button color="primary" routerLink="/tasks/new">
      <mat-icon>add</mat-icon>
      Új feladat
    </a>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="tasks" class="full-width">
      <!-- Cím -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Cím</th>
        <td mat-cell *matCellDef="let task">
          <div class="task-title-cell">
            <mat-icon class="task-icon">assignment</mat-icon>
            <a [routerLink]="['/tasks', task.id]" class="task-link">{{ task.title }}</a>
          </div>
        </td>
      </ng-container>

      <!-- Felelős -->
      <ng-container matColumnDef="user">
        <th mat-header-cell *matHeaderCellDef>Felelős</th>
        <td mat-cell *matCellDef="let task">{{ task.user_name || '-' }}</td>
      </ng-container>

      <!-- Státusz -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Státusz</th>
        <td mat-cell *matCellDef="let task">
          <span class="status-chip" [ngClass]="task.status">
            {{ getStatusLabel(task.status) }}
          </span>
        </td>
      </ng-container>

      <!-- Prioritás -->
      <ng-container matColumnDef="priority">
        <th mat-header-cell *matHeaderCellDef>Prioritás</th>
        <td mat-cell *matCellDef="let task">
          <span class="priority-chip" [ngClass]="task.priority">
            {{ getPriorityLabel(task.priority) }}
          </span>
        </td>
      </ng-container>

      <!-- Határidő -->
      <ng-container matColumnDef="deadline">
        <th mat-header-cell *matHeaderCellDef>Határidő</th>
        <td mat-cell *matCellDef="let task">{{ task.deadline || '-' }}</td>
      </ng-container>

      <!-- Műveletek -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let task">
          <div class="actions">
            <a mat-icon-button [routerLink]="['/tasks', task.id]" matTooltip="Szerkesztés">
              <mat-icon>edit</mat-icon>
            </a>
            <button mat-icon-button color="warn" (click)="deleteTask(task)" matTooltip="Törlés">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    @if (tasks.length === 0) {
      <div class="empty-state">
        <mat-icon>assignment</mat-icon>
        <p>Nincsenek feladatok.</p>
      </div>
    }
  </mat-card>
</div>
