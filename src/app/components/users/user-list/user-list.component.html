<div class="user-list-container">
  <div class="header">
    <h2>Felhasználók</h2>
    <a mat-flat-button color="primary" routerLink="/users/new">
      <mat-icon>person_add</mat-icon>
      Új felhasználó
    </a>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="users" class="full-width">
      <!-- Név oszlop -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Név</th>
        <td mat-cell *matCellDef="let user">
          <div class="user-name-cell">
            <mat-icon class="avatar-icon">account_circle</mat-icon>
            <span>{{ user.name }}</span>
          </div>
        </td>
      </ng-container>

      <!-- Email oszlop -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <!-- Telefon oszlop -->
      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Telefon</th>
        <td mat-cell *matCellDef="let user">{{ user.phone || '-' }}</td>
      </ng-container>

      <!-- Státusz oszlop -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Státusz</th>
        <td mat-cell *matCellDef="let user">
          <span class="status-badge" [class.active]="user.is_active">
            {{ user.is_active ? 'Aktív' : 'Inaktív' }}
          </span>
        </td>
      </ng-container>

      <!-- Műveletek oszlop -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user">
          <div class="actions">
            <a mat-icon-button [routerLink]="['/users', user.id]" matTooltip="Szerkesztés">
              <mat-icon>edit</mat-icon>
            </a>
            <button mat-icon-button color="warn" (click)="deleteUser(user)" matTooltip="Törlés">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    @if (users.length === 0) {
      <div class="empty-state">
        <mat-icon>people_outline</mat-icon>
        <p>Nincsenek felhasználók.</p>
      </div>
    }
  </mat-card>
</div>
