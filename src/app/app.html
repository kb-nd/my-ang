<mat-toolbar class="navbar" color="primary">
  <a routerLink="/" class="brand">MyAng</a>

  @if (authService.isAuthenticated()) {
    <nav class="nav-links">
      <a mat-button routerLink="/users" routerLinkActive="active-link">
        <mat-icon>people</mat-icon>
        Felhasználók
      </a>
      <a mat-button routerLink="/tasks" routerLinkActive="active-link">
        <mat-icon>task_alt</mat-icon>
        Feladatok
      </a>
    </nav>

    <div class="nav-user">
      <a mat-button routerLink="/profile" class="user-link">
        <mat-icon>account_circle</mat-icon>
        {{ authService.currentUser()?.name }}
      </a>
      <button mat-stroked-button (click)="logout()">
        <mat-icon>logout</mat-icon>
        Kilépés
      </button>
    </div>
  } @else {
    <div class="nav-user">
      <a mat-button routerLink="/login">Bejelentkezés</a>
      <a mat-flat-button color="accent" routerLink="/register">Regisztráció</a>
    </div>
  }
</mat-toolbar>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <p>&copy; 2026 MyAng Projekt</p>
</footer>
